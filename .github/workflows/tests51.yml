name: Testes para SEI 5.1.0 Bancos oracle, mysql, sqlserver e postgres

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - "master"
    paths:
      - 'src/**'
      - '.github/workflows/tests51.yml'
env: # Or as an environment variable
  CI: 'true'

jobs:
  test:
    runs-on: HuaweiRunner01
    strategy:
      fail-fast: false
      matrix:
        sei: [release/5.1.0]
        banco: [oracle, mysql, sqlserver, postgresql]
    steps:
      - name: Fetch Pull Request branch
        uses: actions/checkout@v6
        with:
            repository: pengovbr/sei
            token: ${{ secrets.GH_PAT }} # `GH_PAT` is a secret that contains your PAT
            path: sei
            ref: ${{ matrix.sei }}
      - name: Checkout
        uses: actions/checkout@v6
        with:
            path: sei/src/sei/web/modulos/mod-sei-resposta

      - name: Run make test
        run: |
             cd sei/src/sei/web/modulos/mod-sei-resposta
             make config base=${{ matrix.banco }}; make up; sleep 30s; make update; make install
             make tests-functional-full
