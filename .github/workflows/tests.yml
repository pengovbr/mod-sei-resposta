name: Testes SOAP e Funcional

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '35 3 * * *'
  push:
    branches:
      - "master"
    paths:
      - 'src/**'
      - '.github/workflows/tests.yml'
env: # Or as an environment variable
  CI: 'true'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sei: [5.0.4, release/5.1.0]
        banco: [oracle, mysql, sqlserver]
    steps:
      - name: Fetch Pull Request branch
        uses: actions/checkout@v3
        with:
            repository: pengovbr/sei
            token: ${{ secrets.GH_PAT }} # `GH_PAT` is a secret that contains your PAT
            path: sei
            ref: ${{ matrix.sei }}
      - name: Checkout
        uses: actions/checkout@v3
        with:
            path: sei/src/sei/web/modulos/mod-sei-resposta

      - name: Run make test
        run: |
             cd sei/src/sei/web/modulos/mod-sei-resposta
             make config base=${{ matrix.banco }}; make up; sleep 30s; make update; make install
             make tests-functional-full
